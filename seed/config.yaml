# =============================================================================
# Swoop Golf Seed Configuration
# Pinetree Country Club · January 2026
# Edit parameters here — no code changes required
# =============================================================================

random_seed: 42
simulation_month: "2026-01"
club_id: "club_001"

# ─── Member population ────────────────────────────────────────────────────────
member_count: 300

archetype_weights:
  Die-Hard Golfer:   54   # 18%
  Social Butterfly:  45   # 15%
  Balanced Active:   66   # 22%
  Weekend Warrior:   45   # 15%
  Declining:         30   # 10%
  New Member:        24   #  8%
  Ghost:             21   #  7%
  Snowbird:          15   #  5%

# ─── Golf operations ──────────────────────────────────────────────────────────
weekday_utilization_min: 0.55
weekday_utilization_max: 0.70
weekend_utilization_min: 0.85
weekend_utilization_max: 0.95

slow_round_threshold_minutes: 270    # 18-hole rounds above this flagged as slow
post_round_dining_window_minutes: 90  # window after round end to link dining check

# ─── F&B ──────────────────────────────────────────────────────────────────────
tax_rate: 0.085          # Arizona sales tax
comp_rate: 0.05          # 5% of checks comped
discount_rate: 0.08      # 8% of checks discounted
void_rate: 0.02          # 2% of checks have void items
tip_rate_avg: 0.18        # average tip percentage

payment_method_mix:
  member_charge: 0.75
  credit_card:   0.18
  cash:          0.05
  split:         0.02

# ─── Understaffed dates (Grill Room) ─────────────────────────────────────────
understaffed_dates:
  - "2026-01-09"
  - "2026-01-16"
  - "2026-01-28"

understaffed_ticket_time_multiplier: 1.20   # 20% longer ticket times
understaffed_complaint_multiplier: 2.0      # 2x complaint rate
understaffed_revenue_multiplier: 0.92       # ~8% lower F&B revenue

# ─── Resignation scenarios ────────────────────────────────────────────────────
resignation_scenarios:
  - member_id: "mbr_042"   # Kevin Hurst
    resigned_on: "2026-01-08"
    archetype: "Declining"
    pattern: "gradual_decay"

  - member_id: "mbr_117"   # Linda Leonard
    resigned_on: "2026-01-15"
    archetype: "Ghost"
    pattern: "ghost_departure"

  - member_id: "mbr_203"   # James Whitfield
    resigned_on: "2026-01-22"
    archetype: "Balanced Active"
    pattern: "service_failure"
    complaint_date: "2026-01-18"
    complaint_sentiment: -0.8
    complaint_category: "Service Speed"

  - member_id: "mbr_089"   # Anne Jordan
    resigned_on: "2026-01-27"
    archetype: "Weekend Warrior"
    pattern: "slow_withdrawal"

  - member_id: "mbr_271"   # Steven Park
    resigned_on: "2026-01-31"
