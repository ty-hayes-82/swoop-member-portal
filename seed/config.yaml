# ─── Archetype behavioral parameters ─────────────────────────────────────────
# golf_rounds_per_month: [min, max]
# dining_checks_per_month: [min, max]
# email_open_rate: float (0–1)
# email_click_rate: float (0–1)
# event_attendance_rate: float (0–1)
archetype_params:
  Die-Hard Golfer:
    golf_rounds_per_month: [12, 18]
    dining_checks_per_month: [4, 8]
    email_open_rate: 0.18
    email_click_rate: 0.04
    event_attendance_rate: 0.20    # golf events only
    weekend_only: false
    post_round_dining_rate: 0.50

  Social Butterfly:
    golf_rounds_per_month: [2, 5]
    dining_checks_per_month: [8, 14]
    email_open_rate: 0.72
    email_click_rate: 0.22
    event_attendance_rate: 0.75
    weekend_only: false
    post_round_dining_rate: 0.40

  Balanced Active:
    golf_rounds_per_month: [8, 12]
    dining_checks_per_month: [5, 10]
    email_open_rate: 0.55
    email_click_rate: 0.14
    event_attendance_rate: 0.45
    weekend_only: false
    post_round_dining_rate: 0.40

  Weekend Warrior:
    golf_rounds_per_month: [4, 8]
    dining_checks_per_month: [4, 7]
    email_open_rate: 0.32
    email_click_rate: 0.08
    event_attendance_rate: 0.30
    weekend_only: true
    post_round_dining_rate: 0.25

  Declining:
    golf_rounds_per_month: [0, 3]
    dining_checks_per_month: [1, 4]
    email_open_rate: 0.20
    email_click_rate: 0.04
    event_attendance_rate: 0.05
    weekend_only: false
    post_round_dining_rate: 0.15

  New Member:
    golf_rounds_per_month: [4, 10]
    dining_checks_per_month: [3, 8]
    email_open_rate: 0.68
    email_click_rate: 0.18
    event_attendance_rate: 0.50
    weekend_only: false
    post_round_dining_rate: 0.35

  Ghost:
    golf_rounds_per_month: [0, 1]
    dining_checks_per_month: [0, 2]
    email_open_rate: 0.10
    email_click_rate: 0.01
    event_attendance_rate: 0.02
    weekend_only: false
    post_round_dining_rate: 0.10

  Snowbird:
    golf_rounds_per_month: [6, 12]
    dining_checks_per_month: [4, 9]
