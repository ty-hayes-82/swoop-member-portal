# ─── Scottsdale January weather distribution ─────────────────────────────────
weather_distribution:
  sunny:   20
  perfect: 4
  cloudy:  4
  windy:   2
  rainy:   1
# Jan 6 = closed (maintenance)
# Total operating days: 30

weather_modifiers:
  sunny:   { golf: 0.0,   fb: 0.0  }
  perfect: { golf: 0.10,  fb: 0.0  }
  cloudy:  { golf: -0.05, fb: 0.05 }
  windy:   { golf: -0.15, fb: 0.05 }
  rainy:   { golf: -0.40, fb: 0.15 }
