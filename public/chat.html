<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swoop Concierge — Test Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --panel: #181d27;
      --row: #1e2535;
      --row-hover: #252d3e;
      --border: #2a3349;
      --text: #e8edf5;
      --text2: #c4cdd8;
      --muted: #7a8ca0;
      --label: #4e637a;
      --accent: #10b981;
      --accent-hover: #059669;
      --user-bubble: #2563eb;
      --user-text: #fff;
      --bot-bubble: #1e2535;
      --bot-text: #e8edf5;
      --shadow: rgba(0,0,0,0.35);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── Member selector ── */
    #member-bar {
      flex-shrink: 0;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #member-bar::-webkit-scrollbar { display: none; }

    .member-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      background: var(--row);
      color: var(--text2);
      transition: background 0.15s;
    }
    .member-btn:hover { background: var(--row-hover); }
    .member-btn.active { background: #1e3a5f; color: var(--text); }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .av-blue   { background: #2563eb; }
    .av-amber  { background: #d97706; }
    .av-red    { background: #dc2626; }
    .av-purple { background: #7c3aed; }
    .av-gray   { background: #6b7280; }

    .member-btn-info { text-align: left; }
    .member-btn-name { font-size: 12px; font-weight: 600; line-height: 1.2; }
    .member-btn-arch { font-size: 10px; line-height: 1.2; color: var(--muted); }
    .member-btn.active .member-btn-arch { color: var(--label); }

    .health-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .health-green  { background: #10b981; }
    .health-amber  { background: #f59e0b; }
    .health-red    { background: #ef4444; }

    /* ── Member context strip ── */
    #context-strip {
      flex-shrink: 0;
      background: var(--row);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    #context-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    #context-info { min-width: 0; }
    #context-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #context-name { font-size: 14px; font-weight: 600; }
    #context-revenue { font-size: 12px; color: var(--muted); }
    #context-signal { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .health-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
    }

    #context-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-sm {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.1s;
    }
    .btn-sm:hover { color: var(--text2); }
    .btn-sm.danger:hover { color: #f87171; border-color: #f87171; }

    /* ── Chat area ── */
    #chat-outer {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* ── Empty state ── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      padding: 24px;
    }
    #empty-avatar-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #empty-name { font-size: 14px; font-weight: 500; color: var(--text2); text-align: center; }
    #empty-sub { font-size: 12px; color: var(--muted); text-align: center; margin-top: 2px; }
    #suggestions { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 400px; }
    .suggestion-btn {
      text-align: left;
      font-size: 13px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.15s;
    }
    .suggestion-btn:hover { background: var(--row-hover); }

    /* ── Message bubbles ── */
    .msg-row {
      display: flex;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.bot  { justify-content: flex-start; }

    .bubble {
      max-width: 80%;
      border-radius: 18px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      background: var(--user-bubble);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }
    .bubble.bot {
      background: var(--bot-bubble);
      color: var(--bot-text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .bubble-time {
      font-size: 10px;
      margin-top: 4px;
    }
    .bubble.user .bubble-time { color: rgba(255,255,255,0.55); }
    .bubble.bot  .bubble-time { color: var(--label); }

    /* ── Typing indicator ── */
    #typing-indicator {
      display: none;
      justify-content: flex-start;
    }
    #typing-indicator.visible { display: flex; }
    .typing-bubble {
      background: var(--bot-bubble);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 10px 14px;
      box-shadow: 0 1px 4px var(--shadow);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .typing-text { font-size: 12px; color: var(--muted); }
    .dots { display: flex; gap: 3px; }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--label);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    /* ── Suggestion chips (active conversation) ── */
    #chips {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 12px;
      scrollbar-width: none;
    }
    #chips::-webkit-scrollbar { display: none; }
    .chip {
      white-space: nowrap;
      font-size: 12px;
      background: var(--border);
      color: var(--text2);
      border-radius: 999px;
      padding: 5px 12px;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .chip:hover { background: var(--row-hover); }

    /* ── Input bar ── */
    #input-bar {
      flex-shrink: 0;
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    #chat-input {
      flex: 1;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--row);
      color: var(--text);
      padding: 10px 18px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    #chat-input:focus { border-color: var(--accent); }
    #chat-input::placeholder { color: var(--label); }
    #chat-input:disabled { opacity: 0.5; }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--panel);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: none;
      gap: 16px;
      flex-direction: column;
    }
    #sidebar.open { display: flex; }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-title { font-size: 14px; font-weight: 600; }
    .close-btn {
      background: none;
      border: none;
      color: var(--label);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }
    .close-btn:hover { color: var(--muted); }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat-card {
      background: var(--row);
      border-radius: 8px;
      padding: 8px 12px;
    }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .stat-val { font-size: 13px; font-weight: 600; margin-top: 2px; }

    .risk-box {
      background: rgba(220,38,38,0.08);
      border: 1px solid rgba(220,38,38,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #fca5a5;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .sidebar-suggestion {
      width: 100%;
      text-align: left;
      font-size: 12px;
      background: var(--row);
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text2);
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 0.15s;
    }
    .sidebar-suggestion:hover { background: var(--row-hover); }

    /* ── Footer ── */
    #footer {
      flex-shrink: 0;
      background: var(--panel);
      text-align: center;
      padding: 6px;
      font-size: 10px;
      color: var(--label);
      letter-spacing: 0.04em;
      border-top: 1px solid var(--border);
    }
    #footer span { font-weight: 600; color: var(--muted); }

    #scroll-anchor {}
  </style>
</head>
<body>
<div id="app">

  <!-- Member selector bar -->
  <div id="member-bar"></div>

  <!-- Context strip -->
  <div id="context-strip">
    <div id="context-left">
      <div id="ctx-avatar" class="avatar"></div>
      <div id="context-info">
        <div id="context-name-row">
          <span id="context-name"></span>
          <span id="context-revenue"></span>
          <span id="ctx-health-badge" class="health-badge"></span>
        </div>
        <div id="context-signal"></div>
      </div>
    </div>
    <div id="context-actions">
      <button class="btn-sm" id="profile-btn">Profile</button>
      <button class="btn-sm danger" id="clear-btn" style="display:none">Clear</button>
    </div>
  </div>

  <!-- Chat outer (messages + sidebar) -->
  <div id="chat-outer">

    <!-- Left: messages + input -->
    <div style="display:flex; flex-direction:column; flex:1; min-width:0;">
      <div id="messages">
        <div id="empty-state">
          <div id="empty-avatar-wrap">
            <div id="empty-avatar" class="avatar" style="width:48px;height:48px;font-size:16px;"></div>
          </div>
          <div>
            <div id="empty-name"></div>
            <div id="empty-sub"></div>
          </div>
          <div id="suggestions"></div>
        </div>
        <div id="typing-indicator" class="msg-row bot">
          <div class="typing-bubble">
            <span class="typing-text">Concierge is typing</span>
            <div class="dots">
              <div class="dot"></div>
              <div class="dot"></div>
              <div class="dot"></div>
            </div>
          </div>
        </div>
        <div id="scroll-anchor"></div>
      </div>

      <div id="chips"></div>

      <form id="input-bar" onsubmit="return false;">
        <input id="chat-input" type="text" autocomplete="off" />
        <button id="send-btn" type="submit" disabled>
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19V5m0 0l-7 7m7-7l7 7"/>
          </svg>
        </button>
      </form>
    </div>

    <!-- Right: sidebar -->
    <div id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Member Profile</div>
        <button class="close-btn" id="sidebar-close">&times;</button>
      </div>
      <div id="sidebar-content"></div>
    </div>

  </div>

  <div id="footer">Powered by <span>Swoop AI</span></div>
</div>

<script>
const TEST_CLUB = 'seed_pinetree';

const MEMBERS = [
  {
    id: 'mbr_t01',
    name: 'James Whitfield',
    initials: 'JW',
    archetype: 'Balanced Active',
    health: 42,
    revenue: '$18K',
    signal: 'Unresolved complaint, declining rounds',
    avClass: 'av-blue',
    suggestions: [
      'My lunch was really slow',
      'Book my usual Saturday 7 AM',
      'Get Erin on the wine dinner list',
      "What's happening at the club this weekend?",
    ],
  },
  {
    id: 'mbr_t04',
    name: 'Anne Jordan',
    initials: 'AJ',
    archetype: 'Weekend Warrior',
    health: 28,
    revenue: '$14K',
    signal: '3 missed waitlists, walked off Jan 7',
    avClass: 'av-amber',
    suggestions: [
      "Why can't I get a Saturday tee time?",
      'What events are coming up?',
      'I tried to book last weekend and couldn\'t',
      'Is there a ladies golf group?',
    ],
  },
  {
    id: 'mbr_t05',
    name: 'Robert Callahan',
    initials: 'RC',
    archetype: 'Declining',
    health: 22,
    revenue: '$18K',
    signal: 'Hitting exact F&B minimum, 9-day complaint unresolved',
    avClass: 'av-red',
    suggestions: [
      'I want to cancel my membership',
      'Make a dinner reservation',
      'Nobody follows up on anything here',
      'What are the cancellation fees?',
    ],
  },
  {
    id: 'mbr_t06',
    name: 'Margaret Chen',
    initials: 'MC',
    archetype: 'Social Butterfly',
    health: 36,
    revenue: '$9K',
    signal: 'Dining cliff $142 to $18',
    avClass: 'av-purple',
    suggestions: [
      "What's happening this weekend?",
      'Get me a table at the Grill Room',
      'Are there any wine tastings coming up?',
      'Book a table for 6 on Friday',
    ],
  },
  {
    id: 'mbr_t07',
    name: 'Linda Leonard',
    initials: 'LL',
    archetype: 'Ghost',
    health: 12,
    revenue: '$18K',
    signal: 'Zero visits since October, widow',
    avClass: 'av-gray',
    suggestions: [
      "I haven't been to the club in a while",
      "What's new?",
      'Are there any social events for singles?',
      'Is the Sunday brunch still happening?',
    ],
  },
];

/* ── State ── */
let selectedId = MEMBERS[0].id;
let loading = false;
let sidebarOpen = false;

function chatsKey(id) { return `swoop_chat_test_${id}`; }
function loadChats(id) { try { return JSON.parse(localStorage.getItem(chatsKey(id))) || []; } catch { return []; } }
function saveChats(id, msgs) { localStorage.setItem(chatsKey(id), JSON.stringify(msgs)); }

function member() { return MEMBERS.find(m => m.id === selectedId); }
function msgs() { return loadChats(selectedId); }

function healthClass(score) {
  if (score >= 40) return 'health-green';
  if (score >= 25) return 'health-amber';
  return 'health-red';
}

function now() {
  return new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

/* ── Render member bar ── */
function renderMemberBar() {
  const bar = document.getElementById('member-bar');
  bar.innerHTML = MEMBERS.map(m => `
    <button class="member-btn ${m.id === selectedId ? 'active' : ''}" data-id="${m.id}">
      <div class="avatar ${m.avClass}" style="width:32px;height:32px;">${m.initials}</div>
      <div class="member-btn-info">
        <div class="member-btn-name">${m.name.split(' ')[0]}</div>
        <div class="member-btn-arch">${m.archetype}</div>
      </div>
      <div class="health-dot ${healthClass(m.health)}">${m.health}</div>
    </button>
  `).join('');

  bar.querySelectorAll('.member-btn').forEach(btn => {
    btn.addEventListener('click', () => selectMember(btn.dataset.id));
  });
}

/* ── Render context strip ── */
function renderContextStrip() {
  const m = member();
  const el = id => document.getElementById(id);
  el('ctx-avatar').className = `avatar ${m.avClass}`;
  el('ctx-avatar').textContent = m.initials;
  el('context-name').textContent = m.name;
  el('context-revenue').textContent = m.revenue;
  const hb = el('ctx-health-badge');
  hb.className = `health-badge ${healthClass(m.health)}`;
  hb.textContent = m.health;
  el('context-signal').textContent = `${m.archetype} \u00b7 ${m.signal}`;
  el('clear-btn').style.display = msgs().length > 0 ? '' : 'none';
  el('profile-btn').textContent = sidebarOpen ? 'Hide' : 'Profile';
}

/* ── Render sidebar ── */
function renderSidebar() {
  const m = member();
  const sidebar = document.getElementById('sidebar');
  sidebar.className = sidebarOpen ? 'open' : '';
  document.getElementById('sidebar-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
      <div class="avatar ${m.avClass}" style="width:44px;height:44px;">${m.initials}</div>
      <div>
        <div style="font-weight:600;font-size:14px;">${m.name}</div>
        <div style="font-size:11px;color:var(--muted)">${m.id}</div>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Health</div>
        <div class="stat-val" style="display:flex;align-items:center;gap:6px;">
          <span class="health-dot ${healthClass(m.health)}" style="width:10px;height:10px;"></span>
          ${m.health}
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Revenue</div>
        <div class="stat-val">${m.revenue}</div>
      </div>
      <div class="stat-card" style="grid-column:1/-1;">
        <div class="stat-label">Archetype</div>
        <div class="stat-val">${m.archetype}</div>
      </div>
    </div>
    <div>
      <div class="section-label">Risk Signal</div>
      <div class="risk-box">${m.signal}</div>
    </div>
    <div>
      <div class="section-label">Suggestions</div>
      ${m.suggestions.map(s => `<button class="sidebar-suggestion" data-text="${s.replace(/"/g,'&quot;')}">${s}</button>`).join('')}
    </div>
  `;

  document.querySelectorAll('.sidebar-suggestion').forEach(btn => {
    btn.addEventListener('click', () => {
      sendMessage(btn.dataset.text);
      if (window.innerWidth < 640) { sidebarOpen = false; renderSidebar(); renderContextStrip(); }
    });
  });
}

/* ── Render messages ── */
function renderMessages() {
  const messages = msgs();
  const container = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const typing = document.getElementById('typing-indicator');
  const chips = document.getElementById('chips');

  // Empty state
  if (messages.length === 0 && !loading) {
    emptyState.style.display = 'flex';
    const m = member();
    document.getElementById('empty-avatar').className = `avatar ${m.avClass}`;
    document.getElementById('empty-avatar').textContent = m.initials;
    document.getElementById('empty-name').textContent = `Chatting as ${m.name}`;
    document.getElementById('empty-sub').textContent = `${m.archetype} \u00b7 Health ${m.health} \u00b7 ${m.revenue}`;
    document.getElementById('suggestions').innerHTML = m.suggestions.map(s =>
      `<button class="suggestion-btn" data-text="${s.replace(/"/g,'&quot;')}">${s}</button>`
    ).join('');
    document.querySelectorAll('.suggestion-btn').forEach(btn => {
      btn.addEventListener('click', () => sendMessage(btn.dataset.text));
    });
    chips.innerHTML = '';
    chips.style.display = 'none';
  } else {
    emptyState.style.display = 'none';
    chips.style.display = messages.length > 0 && !loading ? 'flex' : 'none';
    if (chips.style.display === 'flex') {
      const used = new Set(messages.filter(m => m.role === 'user').map(m => m.text));
      const available = member().suggestions.filter(s => !used.has(s)).slice(0, 3);
      chips.innerHTML = available.map(s =>
        `<button class="chip" data-text="${s.replace(/"/g,'&quot;')}">${s}</button>`
      ).join('');
      chips.querySelectorAll('.chip').forEach(btn => {
        btn.addEventListener('click', () => sendMessage(btn.dataset.text));
      });
    }
  }

  // Remove previous message rows (keep emptyState, typing, scroll-anchor)
  container.querySelectorAll('.msg-row:not(#typing-indicator)').forEach(el => el.remove());

  // Insert messages before typing indicator
  const anchor = document.getElementById('typing-indicator');
  messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = `msg-row ${msg.role === 'user' ? 'user' : 'bot'}`;
    div.innerHTML = `
      <div class="bubble ${msg.role === 'user' ? 'user' : 'bot'}">
        <div>${escHtml(msg.text)}</div>
        <div class="bubble-time">${msg.time}</div>
      </div>
    `;
    container.insertBefore(div, anchor);
  });

  // Typing indicator
  typing.className = `msg-row bot ${loading ? 'visible' : ''}`;

  // Scroll to bottom
  document.getElementById('scroll-anchor').scrollIntoView({ behavior: messages.length > 3 ? 'smooth' : 'instant' });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/\n/g,'<br>');
}

/* ── Select member ── */
function selectMember(id) {
  selectedId = id;
  renderAll();
  setTimeout(() => document.getElementById('chat-input').focus(), 80);
}

/* ── Send message ── */
async function sendMessage(text) {
  if (!text || !text.trim() || loading) return;
  const trimmed = text.trim();
  loading = true;

  const current = loadChats(selectedId);
  current.push({ role: 'user', text: trimmed, time: now() });
  saveChats(selectedId, current);
  document.getElementById('chat-input').value = '';
  renderAll();

  try {
    const res = await fetch('/api/concierge/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Demo-Club': TEST_CLUB },
      body: JSON.stringify({ member_id: selectedId, message: trimmed }),
    });
    const data = await res.json();
    const updated = loadChats(selectedId);
    updated.push({ role: 'bot', text: data.response || data.error || 'No response', time: now() });
    saveChats(selectedId, updated);
  } catch (err) {
    const updated = loadChats(selectedId);
    updated.push({ role: 'bot', text: `Error: ${err.message}`, time: now() });
    saveChats(selectedId, updated);
  }

  loading = false;
  renderAll();
  document.getElementById('chat-input').focus();
}

/* ── Render all ── */
function renderAll() {
  renderMemberBar();
  renderContextStrip();
  renderSidebar();
  renderMessages();
  updateInput();
}

function updateInput() {
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  const m = member();
  input.placeholder = `Message as ${m.name.split(' ')[0]}...`;
  input.disabled = loading;
  sendBtn.disabled = loading || !input.value.trim();
}

/* ── Events ── */
document.getElementById('chat-input').addEventListener('input', updateInput);
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(document.getElementById('chat-input').value);
  }
});
document.getElementById('send-btn').addEventListener('click', () => {
  sendMessage(document.getElementById('chat-input').value);
});
document.getElementById('profile-btn').addEventListener('click', () => {
  sidebarOpen = !sidebarOpen;
  renderSidebar();
  renderContextStrip();
});
document.getElementById('sidebar-close').addEventListener('click', () => {
  sidebarOpen = false;
  renderSidebar();
  renderContextStrip();
});
document.getElementById('clear-btn').addEventListener('click', () => {
  localStorage.removeItem(chatsKey(selectedId));
  renderAll();
});

/* ── Init ── */
renderAll();
document.getElementById('chat-input').focus();
</script>
</body>
</html>
