<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Swoop Concierge — Test Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --panel: #181d27;
      --row: #1e2535;
      --row-hover: #252d3e;
      --border: #2a3349;
      --text: #e8edf5;
      --text2: #c4cdd8;
      --muted: #7a8ca0;
      --label: #4e637a;
      --accent: #10b981;
      --accent-hover: #059669;
      --user-bubble: #2563eb;
      --bot-bubble: #1e2535;
      --shadow: rgba(0,0,0,0.35);
    }

    html {
      height: 100%;
      overflow-x: hidden;
    }
    body {
      height: 100%;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      overflow: hidden;
    }

    /* ─────────────────────────────────────────
       MEMBER BAR — 5 equal columns, no scroll
    ───────────────────────────────────────── */
    #member-bar {
      flex-shrink: 0;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 8px 6px;
      display: flex;
      width: 100%;
    }

    .member-btn {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 2px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .member-btn:active { background: var(--row-hover); }
    .member-btn.active { background: var(--row); color: var(--text); }

    .avatar {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      flex-shrink: 0;
    }
    .av-blue   { background: #2563eb; }
    .av-amber  { background: #d97706; }
    .av-red    { background: #dc2626; }
    .av-purple { background: #7c3aed; }
    .av-gray   { background: #6b7280; }

    /* Avatar in member bar: 36px with health dot overlay */
    .bar-avatar-wrap {
      position: relative;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }
    .bar-avatar {
      width: 36px;
      height: 36px;
      font-size: 11px;
    }
    .bar-health {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--panel);
    }
    .member-btn.active .bar-health { border-color: var(--row); }

    .health-green  { background: #10b981; }
    .health-amber  { background: #f59e0b; }
    .health-red    { background: #ef4444; }

    .bar-name {
      font-size: 10px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      padding: 0 2px;
      color: var(--muted);
    }
    .member-btn.active .bar-name { color: var(--text2); }

    /* ─────────────────────────────────────────
       CONTEXT STRIP
    ───────────────────────────────────────── */
    #context-strip {
      flex-shrink: 0;
      background: var(--row);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }
    #ctx-avatar {
      width: 38px;
      height: 38px;
      font-size: 13px;
      flex-shrink: 0;
    }
    #context-info {
      flex: 1;
      min-width: 0;
    }
    #context-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    #context-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #context-revenue {
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .health-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1px 5px;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    #context-signal {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #context-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .btn-sm {
      font-size: 11px;
      padding: 5px 9px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-sm:active { color: var(--text2); }
    .btn-sm.danger:active { color: #f87171; border-color: #f87171; }

    /* ─────────────────────────────────────────
       CHAT AREA
    ───────────────────────────────────────── */
    #chat-outer {
      flex: 1;
      display: flex;
      min-height: 0;
      width: 100%;
      overflow: hidden;
      position: relative;
    }

    #chat-col {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      width: 100%;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* ─────────────────────────────────────────
       EMPTY STATE
    ───────────────────────────────────────── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 14px;
      padding: 20px 16px;
      min-height: 0;
    }
    #empty-name { font-size: 14px; font-weight: 500; color: var(--text2); text-align: center; }
    #empty-sub  { font-size: 12px; color: var(--muted); text-align: center; margin-top: 2px; }
    #suggestions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 420px;
    }
    .suggestion-btn {
      text-align: left;
      font-size: 13px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      color: var(--text2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      width: 100%;
    }
    .suggestion-btn:active { background: var(--row-hover); }

    /* ─────────────────────────────────────────
       MESSAGE BUBBLES
    ───────────────────────────────────────── */
    .msg-row { display: flex; max-width: 100%; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.bot  { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      border-radius: 18px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .bubble.user {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.bot {
      background: var(--bot-bubble);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .bubble.bot.ack {
      color: var(--muted);
      font-style: italic;
      box-shadow: none;
    }
    .bubble-time { font-size: 10px; margin-top: 4px; }
    .bubble.user .bubble-time { color: rgba(255,255,255,0.5); }
    .bubble.bot  .bubble-time { color: var(--label); }

    /* ─────────────────────────────────────────
       TYPING INDICATOR
    ───────────────────────────────────────── */
    #typing-indicator { display: none; justify-content: flex-start; }
    #typing-indicator.visible { display: flex; }
    .typing-bubble {
      background: var(--bot-bubble);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 10px 14px;
      box-shadow: 0 1px 4px var(--shadow);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .typing-text { font-size: 12px; color: var(--muted); }
    .dots { display: flex; gap: 3px; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--label);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-5px); }
    }

    /* ─────────────────────────────────────────
       CHIPS — wrapping, no horizontal scroll
    ───────────────────────────────────────── */
    #chips {
      flex-shrink: 0;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px 12px 4px;
      width: 100%;
    }
    #chips.visible { display: flex; }
    .chip {
      font-size: 12px;
      background: var(--border);
      color: var(--text2);
      border-radius: 999px;
      padding: 5px 12px;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chip:active { background: var(--row-hover); }

    /* ─────────────────────────────────────────
       INPUT BAR
    ───────────────────────────────────────── */
    #input-bar {
      flex-shrink: 0;
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 8px 10px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }
    #chat-input {
      flex: 1;
      min-width: 0;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--row);
      color: var(--text);
      padding: 10px 16px;
      font-size: 16px; /* 16px prevents iOS zoom on focus */
      outline: none;
      font-family: inherit;
      -webkit-appearance: none;
      width: 100%;
    }
    #chat-input:focus { border-color: var(--accent); }
    #chat-input::placeholder { color: var(--label); }
    #chat-input:disabled { opacity: 0.5; }

    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #send-btn:active:not(:disabled) { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.4; }

    /* ─────────────────────────────────────────
       SIDEBAR — overlay on mobile, inline on desktop
    ───────────────────────────────────────── */

    /* Mobile: full-width bottom sheet */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
    }
    #sidebar-overlay.open { display: block; }

    #sidebar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 70dvh;
      background: var(--panel);
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      overflow-y: auto;
      padding: 16px 16px max(16px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 101;
      transform: translateY(100%);
      transition: transform 0.25s ease;
    }
    #sidebar.open { transform: translateY(0); }

    /* Drag handle */
    #sidebar::before {
      content: '';
      display: block;
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: -6px auto 6px;
      flex-shrink: 0;
    }

    /* Desktop: side panel inline */
    @media (min-width: 640px) {
      #sidebar-overlay { display: none !important; }

      #sidebar {
        position: static;
        transform: none;
        max-height: none;
        border-top: none;
        border-left: 1px solid var(--border);
        border-radius: 0;
        width: 260px;
        flex-shrink: 0;
        display: none;
        transition: none;
        padding: 16px;
      }
      #sidebar.open {
        display: flex;
        transform: none;
      }
      #sidebar::before { display: none; }
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .sidebar-title { font-size: 14px; font-weight: 600; }
    .close-btn {
      background: none;
      border: none;
      color: var(--label);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      -webkit-tap-highlight-color: transparent;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat-card {
      background: var(--row);
      border-radius: 8px;
      padding: 8px 12px;
    }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .stat-val   { font-size: 13px; font-weight: 600; margin-top: 2px; }

    .risk-box {
      background: rgba(220,38,38,0.08);
      border: 1px solid rgba(220,38,38,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #fca5a5;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .sidebar-suggestion {
      width: 100%;
      text-align: left;
      font-size: 12px;
      background: var(--row);
      border: none;
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text2);
      cursor: pointer;
      margin-bottom: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .sidebar-suggestion:active { background: var(--row-hover); }

    /* ─────────────────────────────────────────
       FOOTER
    ───────────────────────────────────────── */
    #footer {
      flex-shrink: 0;
      background: var(--panel);
      text-align: center;
      padding: 5px;
      font-size: 10px;
      color: var(--label);
      letter-spacing: 0.04em;
    }
    #footer strong { font-weight: 600; color: var(--muted); }
  </style>
</head>
<body>
<div id="app">

  <div id="member-bar"></div>

  <div id="context-strip">
    <div id="ctx-avatar" class="avatar"></div>
    <div id="context-info">
      <div id="context-name-row">
        <span id="context-name"></span>
        <span id="context-revenue"></span>
        <span id="ctx-health-badge" class="health-badge"></span>
      </div>
      <div id="context-signal"></div>
    </div>
    <div id="context-actions">
      <button class="btn-sm" id="profile-btn">Info</button>
      <button class="btn-sm danger" id="clear-btn" style="display:none">Clear</button>
    </div>
  </div>

  <div id="chat-outer">
    <div id="chat-col">
      <div id="messages">
        <div id="empty-state">
          <div id="empty-avatar" class="avatar" style="width:52px;height:52px;font-size:17px;"></div>
          <div>
            <div id="empty-name"></div>
            <div id="empty-sub"></div>
          </div>
          <div id="suggestions"></div>
        </div>
        <div id="typing-indicator" class="msg-row bot">
          <div class="typing-bubble">
            <span class="typing-text">Typing</span>
            <div class="dots">
              <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
          </div>
        </div>
        <div id="scroll-anchor"></div>
      </div>

      <div id="chips"></div>

      <form id="input-bar" onsubmit="return false;">
        <input id="chat-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="send" />
        <button id="send-btn" type="submit" disabled aria-label="Send">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19V5m0 0l-7 7m7-7l7 7"/>
          </svg>
        </button>
      </form>
    </div>

    <!-- Desktop side panel (shown inline on ≥640px) -->
    <div id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Member Profile</div>
        <button class="close-btn" id="sidebar-close">&times;</button>
      </div>
      <div id="sidebar-content"></div>
    </div>
  </div>

  <div id="footer">Powered by <strong>Swoop AI</strong></div>
</div>

<!-- Mobile overlay backdrop -->
<div id="sidebar-overlay"></div>

<script>
const TEST_CLUB = 'seed_pinetree';

const MEMBERS = [
  { id: 'mbr_t01', name: 'James Whitfield',  initials: 'JW', archetype: 'Balanced Active',  health: 42, revenue: '$18K', signal: 'Unresolved complaint, declining rounds',            avClass: 'av-blue',   suggestions: ['My lunch was really slow','Book my usual Saturday 7 AM','Get Erin on the wine dinner list',"What's happening at the club this weekend?"] },
  { id: 'mbr_t04', name: 'Anne Jordan',       initials: 'AJ', archetype: 'Weekend Warrior',  health: 28, revenue: '$14K', signal: '3 missed waitlists, walked off Jan 7',              avClass: 'av-amber',  suggestions: ["Why can't I get a Saturday tee time?",'What events are coming up?',"I tried to book last weekend and couldn't",'Is there a ladies golf group?'] },
  { id: 'mbr_t05', name: 'Robert Callahan',   initials: 'RC', archetype: 'Declining',         health: 22, revenue: '$18K', signal: 'Hitting exact F&B minimum, complaint unresolved',   avClass: 'av-red',    suggestions: ['I want to cancel my membership','Make a dinner reservation','Nobody follows up on anything here','What are the cancellation fees?'] },
  { id: 'mbr_t06', name: 'Margaret Chen',     initials: 'MC', archetype: 'Social Butterfly',  health: 36, revenue: '$9K',  signal: 'Dining cliff $142 to $18',                         avClass: 'av-purple', suggestions: ["What's happening this weekend?",'Get me a table at the Grill Room','Are there any wine tastings coming up?','Book a table for 6 on Friday'] },
  { id: 'mbr_t07', name: 'Linda Leonard',     initials: 'LL', archetype: 'Ghost',             health: 12, revenue: '$18K', signal: 'Zero visits since October, widow',                  avClass: 'av-gray',   suggestions: ["I haven't been to the club in a while","What's new?",'Are there any social events for singles?','Is the Sunday brunch still happening?'] },
];

let selectedId = MEMBERS[0].id;
let loading = false;
let sidebarOpen = false;

const chatsKey = id => `swoop_chat_test_${id}`;
const loadChats = id => { try { return JSON.parse(localStorage.getItem(chatsKey(id))) || []; } catch { return []; } };
const saveChats = (id, m) => localStorage.setItem(chatsKey(id), JSON.stringify(m));
const member = () => MEMBERS.find(m => m.id === selectedId);
const msgs = () => loadChats(selectedId);
const healthClass = s => s >= 40 ? 'health-green' : s >= 25 ? 'health-amber' : 'health-red';
const now = () => new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');

/* ── Member bar ── */
function renderMemberBar() {
  const bar = document.getElementById('member-bar');
  bar.innerHTML = MEMBERS.map(m => `
    <button class="member-btn ${m.id === selectedId ? 'active' : ''}" data-id="${m.id}" aria-label="${m.name}">
      <div class="bar-avatar-wrap">
        <div class="avatar bar-avatar ${m.avClass}">${m.initials}</div>
        <div class="bar-health ${healthClass(m.health)}">${m.health}</div>
      </div>
      <div class="bar-name">${m.name.split(' ')[0]}</div>
    </button>
  `).join('');
  bar.querySelectorAll('.member-btn').forEach(btn =>
    btn.addEventListener('click', () => selectMember(btn.dataset.id))
  );
}

/* ── Context strip ── */
function renderContextStrip() {
  const m = member();
  document.getElementById('ctx-avatar').className = `avatar ${m.avClass}`;
  document.getElementById('ctx-avatar').style.cssText = 'width:38px;height:38px;font-size:13px;flex-shrink:0;';
  document.getElementById('ctx-avatar').textContent = m.initials;
  document.getElementById('context-name').textContent = m.name;
  document.getElementById('context-revenue').textContent = m.revenue;
  const hb = document.getElementById('ctx-health-badge');
  hb.className = `health-badge ${healthClass(m.health)}`;
  hb.textContent = m.health;
  document.getElementById('context-signal').textContent = `${m.archetype} \u00b7 ${m.signal}`;
  document.getElementById('clear-btn').style.display = msgs().length > 0 ? '' : 'none';
  document.getElementById('profile-btn').textContent = sidebarOpen ? 'Hide' : 'Info';
}

/* ── Sidebar ── */
function renderSidebar() {
  const m = member();
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.className = sidebarOpen ? 'open' : '';
  overlay.className = sidebarOpen ? 'open' : '';

  document.getElementById('sidebar-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="avatar ${m.avClass}" style="width:44px;height:44px;font-size:14px;">${m.initials}</div>
      <div>
        <div style="font-weight:600;font-size:14px;">${m.name}</div>
        <div style="font-size:11px;color:var(--muted)">${m.id}</div>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Health</div>
        <div class="stat-val" style="display:flex;align-items:center;gap:5px;">
          <span style="width:9px;height:9px;border-radius:50%;display:inline-block;" class="${healthClass(m.health)}"></span>${m.health}
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Revenue</div>
        <div class="stat-val">${m.revenue}</div>
      </div>
      <div class="stat-card" style="grid-column:1/-1;">
        <div class="stat-label">Archetype</div>
        <div class="stat-val">${m.archetype}</div>
      </div>
    </div>
    <div>
      <div class="section-label">Risk Signal</div>
      <div class="risk-box">${esc(m.signal)}</div>
    </div>
    <div>
      <div class="section-label">Try saying</div>
      ${m.suggestions.map(s => `<button class="sidebar-suggestion" data-text="${s.replace(/"/g,'&quot;')}">${esc(s)}</button>`).join('')}
    </div>
  `;

  document.querySelectorAll('.sidebar-suggestion').forEach(btn =>
    btn.addEventListener('click', () => {
      closeSidebar();
      sendMessage(btn.dataset.text);
    })
  );
}

function closeSidebar() {
  sidebarOpen = false;
  renderSidebar();
  renderContextStrip();
}

/* ── Messages ── */
function renderMessages() {
  const messages = msgs();
  const container = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const typing = document.getElementById('typing-indicator');
  const chips = document.getElementById('chips');

  if (messages.length === 0 && !loading) {
    emptyState.style.display = 'flex';
    const m = member();
    document.getElementById('empty-avatar').className = `avatar ${m.avClass}`;
    document.getElementById('empty-avatar').style.cssText = 'width:52px;height:52px;font-size:17px;';
    document.getElementById('empty-avatar').textContent = m.initials;
    document.getElementById('empty-name').textContent = `Chatting as ${m.name}`;
    document.getElementById('empty-sub').textContent = `${m.archetype} \u00b7 Health ${m.health} \u00b7 ${m.revenue}`;
    document.getElementById('suggestions').innerHTML = m.suggestions.map(s =>
      `<button class="suggestion-btn" data-text="${s.replace(/"/g,'&quot;')}">${esc(s)}</button>`
    ).join('');
    document.querySelectorAll('.suggestion-btn').forEach(btn =>
      btn.addEventListener('click', () => sendMessage(btn.dataset.text))
    );
    chips.className = 'chips';
  } else {
    emptyState.style.display = 'none';
    const used = new Set(messages.filter(m => m.role === 'user').map(m => m.text));
    const available = member().suggestions.filter(s => !used.has(s)).slice(0, 3);
    if (available.length > 0 && !loading) {
      chips.className = 'visible';
      chips.innerHTML = available.map(s =>
        `<button class="chip" data-text="${s.replace(/"/g,'&quot;')}">${esc(s)}</button>`
      ).join('');
      chips.querySelectorAll('.chip').forEach(btn =>
        btn.addEventListener('click', () => sendMessage(btn.dataset.text))
      );
    } else {
      chips.className = '';
      chips.innerHTML = '';
    }
  }

  container.querySelectorAll('.msg-row:not(#typing-indicator)').forEach(el => el.remove());

  const anchor = document.getElementById('typing-indicator');
  messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = `msg-row ${msg.role === 'user' ? 'user' : 'bot'}`;
    const ackClass = msg.isAck ? ' ack' : '';
    div.innerHTML = `<div class="bubble ${msg.role === 'user' ? 'user' : 'bot'}${ackClass}"><div>${esc(msg.text)}</div><div class="bubble-time">${msg.time}</div></div>`;
    container.insertBefore(div, anchor);
  });

  typing.className = `msg-row bot ${loading ? 'visible' : ''}`;
  document.getElementById('scroll-anchor').scrollIntoView({ behavior: messages.length > 3 ? 'smooth' : 'instant' });
}

function renderAll() {
  renderMemberBar();
  renderContextStrip();
  renderSidebar();
  renderMessages();
  updateInput();
}

function updateInput() {
  const input = document.getElementById('chat-input');
  const btn = document.getElementById('send-btn');
  input.placeholder = `Message as ${member().name.split(' ')[0]}...`;
  input.disabled = loading;
  btn.disabled = loading || !input.value.trim();
}

function selectMember(id) {
  selectedId = id;
  renderAll();
}

/* ── Intent detection for quick ack ── */
function getTeeTimeQuickAck(text) {
  const t = text.toLowerCase();
  const isTeeRequest = /\b(book|reserve|tee\s*time|my\s*usual|get\s*me\s*(on|a)|usual\s*slot)\b/i.test(t) ||
    (/\b(saturday|sunday|monday|tuesday|wednesday|thursday|friday|tomorrow|this\s*week)\b/i.test(t) &&
     /\b(7\s*(am|:)|8\s*(am|:)|9\s*(am|:)|morning|golf|round|tee)\b/i.test(t));
  if (!isTeeRequest) return null;
  const day = /saturday/i.test(t) ? 'Saturday' :
              /sunday/i.test(t)   ? 'Sunday'   :
              /tomorrow/i.test(t) ? 'tomorrow' : null;
  return day ? `On it, checking ${day} availability...` : 'On it, checking availability...';
}

async function sendMessage(text) {
  if (!text?.trim() || loading) return;
  const trimmed = text.trim();
  loading = true;

  // Add user message
  const current = loadChats(selectedId);
  current.push({ role: 'user', text: trimmed, time: now() });
  saveChats(selectedId, current);
  document.getElementById('chat-input').value = '';
  renderAll();

  // Quick ack: show immediately for tee time booking intent
  const quickAck = getTeeTimeQuickAck(trimmed);
  if (quickAck) {
    const withAck = loadChats(selectedId);
    withAck.push({ role: 'bot', text: quickAck, time: now(), isAck: true });
    saveChats(selectedId, withAck);
    renderAll();
    // Small pause so the ack reads naturally before the options arrive
    await new Promise(r => setTimeout(r, 1800));
  }

  try {
    // Include last bot response so the model can resolve affirmatives ("Yes", "Sure") correctly
    const history = loadChats(selectedId);
    const lastBot = [...history].reverse().find(m => m.role === 'bot' && !m.isAck);
    const res = await fetch('/api/concierge/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Demo-Club': TEST_CLUB },
      body: JSON.stringify({ member_id: selectedId, message: trimmed, last_response: lastBot?.text || null }),
    });
    const data = await res.json();
    const updated = loadChats(selectedId);
    updated.push({ role: 'bot', text: data.response || data.error || 'No response', time: now() });
    saveChats(selectedId, updated);
  } catch (err) {
    const updated = loadChats(selectedId);
    updated.push({ role: 'bot', text: `Error: ${err.message}`, time: now() });
    saveChats(selectedId, updated);
  }

  loading = false;
  renderAll();
  document.getElementById('chat-input').focus();
}

/* ── Events ── */
document.getElementById('chat-input').addEventListener('input', updateInput);
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(document.getElementById('chat-input').value); }
});
document.getElementById('send-btn').addEventListener('click', () => sendMessage(document.getElementById('chat-input').value));
document.getElementById('profile-btn').addEventListener('click', () => { sidebarOpen = !sidebarOpen; renderSidebar(); renderContextStrip(); });
document.getElementById('sidebar-close').addEventListener('click', closeSidebar);
document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
document.getElementById('clear-btn').addEventListener('click', () => { localStorage.removeItem(chatsKey(selectedId)); renderAll(); });

/* ── Init ── */
renderAll();
</script>
</body>
</html>
